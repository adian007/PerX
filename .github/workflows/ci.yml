name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: perx_user
          POSTGRES_PASSWORD: perx_secret
          POSTGRES_DB: perx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U perx_user -d perx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://perx_user:perx_secret@localhost:5432/perx
      REDIS_USE_MEMORY: "true"
      ALLOW_DEMO_MODE: "true"
      JWT_SECRET: ci-test-secret
      INTERNAL_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends coinor-cbc libglpk-dev postgresql-client
      - name: Apply SQL migrations
        working-directory: .
        run: |
          for migration in database/migrations/*.sql; do
            PGPASSWORD=perx_secret psql -h localhost -U perx_user -d perx -v ON_ERROR_STOP=1 -f "$migration"
          done
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest tests/ -v --tb=short

  cv-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cv-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: cv-service/requirements.txt
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr libgl1
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
